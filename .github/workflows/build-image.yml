name: Build ERPverein Image

on:
  workflow_dispatch:
    inputs:
      erpnext_version:
        description: "Pinned ERPNext tag"
        required: true
        default: "v16.28.0"
      app_ref:
        description: "erpverein git ref to install into the image"
        required: true
        default: "main"
      image_tag:
        description: "Optional image tag; unsupported characters are replaced with '-'"
        required: false
  push:
    tags:
      - "erpverein-v*.*.*-*.*.*"

permissions:
  contents: read
  packages: write

env:
  DEFAULT_ERP_VERSION: v16.28.0
  FRAPPE_VERSION: v16.27.0
  FRAPPE_DOCKER_REF: d4a310089f5d6fc38ed1317b898d75b9c74901db
  MARIADB_IMAGE: mariadb:11.8.5@sha256:345fa26d595e8c7fe298e0c4098ed400356f502458769c8902229b3437d6da2b
  REDIS_IMAGE: redis:6.2.19-alpine@sha256:7fe72c486b910f6b1a9769c937dad5d63648ddee82e056f47417542dd40825bb
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/erpverein

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout erpverein
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare build metadata
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ERP_VERSION: ${{ github.event.inputs.erpnext_version }}
          INPUT_APP_REF: ${{ github.event.inputs.app_ref }}
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          DEFAULT_ERP_VERSION: ${{ env.DEFAULT_ERP_VERSION }}
        run: |
          set -euo pipefail

          PYPROJECT_VERSION="$(python3 -c 'import pathlib, re; text = pathlib.Path("pyproject.toml").read_text(); print(re.search(r"^version = \"([^\"]+)\"$", text, re.MULTILINE).group(1))')"
          PACKAGE_VERSION="$(python3 -c 'import erpverein; print(erpverein.__version__)')"
          if [[ "$PYPROJECT_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "pyproject.toml ($PYPROJECT_VERSION) and erpverein.__version__ ($PACKAGE_VERSION) differ" >&2
            exit 1
          fi

          if [[ "$EVENT_NAME" == "push" && "$REF_TYPE" == "tag" ]]; then
            if [[ ! "$REF_NAME" =~ ^erpverein-v(16\.[0-9]+\.[0-9]+)-([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "Release tag must look like erpverein-v16.28.0-0.1.7" >&2
              exit 1
            fi

            ERP_VERSION="v${BASH_REMATCH[1]}"
            TAG_APP_VERSION="${BASH_REMATCH[2]}"
            if [[ "$TAG_APP_VERSION" != "$PYPROJECT_VERSION" ]]; then
              echo "Release tag app version ($TAG_APP_VERSION) does not match package version ($PYPROJECT_VERSION)" >&2
              exit 1
            fi

            APP_REF="$REF_NAME"
            IMAGE_TAG="$REF_NAME"
          else
            ERP_VERSION="${INPUT_ERP_VERSION:-$DEFAULT_ERP_VERSION}"
            APP_REF="${INPUT_APP_REF:-$REF_NAME}"
            RAW_IMAGE_TAG="${INPUT_IMAGE_TAG:-ci-${GITHUB_RUN_NUMBER}}"

            if [[ ! "$ERP_VERSION" =~ ^v16\.[0-9]+\.[0-9]+$ ]]; then
              echo "ERPNext version must be an exact v16 release tag" >&2
              exit 1
            fi
            if [[ ! "$APP_REF" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]{0,127}$ ]] ||
               [[ "$APP_REF" == *".."* || "$APP_REF" == *"//"* || "$APP_REF" == *"@{"* || "$APP_REF" == *.lock ]]; then
              echo "app_ref is not a supported branch or tag name" >&2
              exit 1
            fi

            IMAGE_TAG="$(printf '%s' "$RAW_IMAGE_TAG" | tr '[:upper:]/' '[:lower:]-' | tr -cs 'a-z0-9_.-' '-' | cut -c1-128)"
            if [[ -z "$IMAGE_TAG" || "$IMAGE_TAG" == [.-]* ]]; then
              echo "image_tag is empty or invalid after sanitization" >&2
              exit 1
            fi
          fi

          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/erpverein"
          echo "erp_version=${ERP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_ref=${APP_REF}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create apps.json
        shell: bash
        env:
          APP_REF: ${{ steps.vars.outputs.app_ref }}
          ERP_VERSION: ${{ steps.vars.outputs.erp_version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os

          apps = [
              {"url": "https://github.com/frappe/erpnext", "branch": os.environ["ERP_VERSION"]},
              {"url": f"https://github.com/{os.environ['REPOSITORY']}", "branch": os.environ["APP_REF"]},
          ]
          with open("/tmp/apps.json", "w", encoding="utf-8") as apps_file:
              json.dump(apps, apps_file)
          PY

      - name: Checkout frappe_docker
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: frappe/frappe_docker
          ref: ${{ env.FRAPPE_DOCKER_REF }}
          path: frappe_docker

      - name: Build and load linux/amd64 image
        shell: bash
        env:
          IMAGE_REF: ${{ steps.vars.outputs.image_ref }}
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --platform linux/amd64 \
            --secret id=apps_json,src=/tmp/apps.json \
            --build-arg FRAPPE_PATH=https://github.com/frappe/frappe \
            --build-arg FRAPPE_BRANCH="$FRAPPE_VERSION" \
            --build-arg CACHE_BUST="$GITHUB_SHA" \
            --label "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
            --label "org.opencontainers.image.description=ERPverein ERPNext image" \
            --label "org.opencontainers.image.licenses=MIT" \
            --tag "$IMAGE_REF" \
            --file frappe_docker/images/layered/Containerfile \
            frappe_docker

      - name: Verify clean-site install, migration, and tests
        shell: bash
        env:
          IMAGE_REF: ${{ steps.vars.outputs.image_ref }}
        run: |
          set -euo pipefail

          NETWORK="erpverein-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          SITES_VOLUME="erpverein-ci-sites-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          DB_CONTAINER="erpverein-ci-db-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          REDIS_CONTAINER="erpverein-ci-redis-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          cleanup() {
            docker rm -f "$DB_CONTAINER" "$REDIS_CONTAINER" >/dev/null 2>&1 || true
            docker volume rm "$SITES_VOLUME" >/dev/null 2>&1 || true
            docker network rm "$NETWORK" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker network create "$NETWORK"
          docker volume create "$SITES_VOLUME"
          docker run --detach --name "$DB_CONTAINER" --network "$NETWORK" --network-alias db \
            --health-cmd='healthcheck.sh --connect --innodb_initialized' \
            --health-interval=5s --health-timeout=5s --health-retries=24 \
            -e MYSQL_ROOT_PASSWORD=admin -e MARIADB_ROOT_PASSWORD=admin \
            "$MARIADB_IMAGE" \
            --character-set-server=utf8mb4 \
            --collation-server=utf8mb4_unicode_ci \
            --skip-character-set-client-handshake
          docker run --detach --name "$REDIS_CONTAINER" --network "$NETWORK" \
            --network-alias redis-cache --network-alias redis-queue "$REDIS_IMAGE"

          for attempt in {1..30}; do
            if [[ "$(docker inspect --format '{{.State.Health.Status}}' "$DB_CONTAINER")" == "healthy" ]]; then
              break
            fi
            sleep 5
          done
          if [[ "$(docker inspect --format '{{.State.Health.Status}}' "$DB_CONTAINER")" != "healthy" ]]; then
            docker logs "$DB_CONTAINER"
            exit 1
          fi
          docker exec "$REDIS_CONTAINER" redis-cli ping

          docker run --rm --network "$NETWORK" \
            --volume "$SITES_VOLUME:/home/frappe/frappe-bench/sites" \
            "$IMAGE_REF" bash -lc '
              set -euo pipefail
              ls -1 apps > sites/apps.txt
              bench set-config -g db_host db
              bench set-config -gp db_port 3306
              bench set-config -g redis_cache redis://redis-cache:6379
              bench set-config -g redis_queue redis://redis-queue:6379
              bench set-config -g redis_socketio redis://redis-queue:6379
              bench new-site ci.localhost \
                --mariadb-user-host-login-scope="%" \
                --admin-password=admin \
                --db-root-username=root \
                --db-root-password=admin \
                --install-app erpnext
              bench --site ci.localhost install-app erpverein
              bench --site ci.localhost migrate
              bench --site ci.localhost set-config allow_tests true
              bench --site ci.localhost run-tests --module erpnext.tests.bootstrap_test_data --lightmode
              bench --site ci.localhost run-tests --app erpverein
            '

      - name: Push verified image
        if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag'
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ${{ steps.vars.outputs.image_ref }}
        run: |
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          docker push "$IMAGE_REF"
